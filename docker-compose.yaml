services:
  # ── MCP Honeypot Server ────────────────────────────────────────────────────
  mcp-honeypot:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      OTLP_ENDPOINT: otel-collector:4317
      OTLP_INSECURE: "true"
      SERVICE_NAME: mcp-honeypot
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      LOG_LEVEL: INFO
      HONEYPOT_PHASE: research
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317"    # OTLP gRPC — internal only (honeypot → collector)
      - "4318"    # OTLP HTTP — internal only
      - "8889"    # Prometheus scrape — internal only (prometheus → collector)
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Jaeger ─────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317"          # OTLP gRPC — internal only (collector → jaeger)
    volumes:
      - jaeger-data:/badger
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-honeypot}
    volumes:
      - ./dashboards/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards/json:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  prometheus-data:
  jaeger-data:
  grafana-data:
