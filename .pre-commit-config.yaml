repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]

  # Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Python linting + formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Type checking
  - repo: https://github.com/RobertCraiwordie/pyright-python
    rev: v1.1.391
    hooks:
      - id: pyright
        additional_dependencies:
          - opentelemetry-sdk==1.32.0
          - opentelemetry-api==1.32.0
          - opentelemetry-exporter-otlp-proto-grpc==1.32.0
          - structlog==25.1.0
          - starlette==0.46.1
          - mcp==1.6.0
          - slowapi==0.1.9

  # Tests (unit only — no Docker required)
  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit tests)
        entry: bash -c 'PYTHONPATH=server pytest tests/ -x -q --tb=short'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3013, --ignore, DL3008]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, relaxed]
