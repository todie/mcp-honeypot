apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-honeypot.fullname" . }}-grafana
  labels:
    {{- include "mcp-honeypot.componentFullLabels" (dict "component" "grafana" "root" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mcp-honeypot.componentLabels" (dict "component" "grafana" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-honeypot.componentLabels" (dict "component" "grafana" "root" .) | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.grafana.port }}
              protocol: TCP
          volumeMounts:
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
              readOnly: true
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: provisioning-datasources
          configMap:
            name: {{ include "mcp-honeypot.fullname" . }}-grafana
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: provisioning-dashboards
          configMap:
            name: {{ include "mcp-honeypot.fullname" . }}-grafana
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "mcp-honeypot.fullname" . }}-grafana
