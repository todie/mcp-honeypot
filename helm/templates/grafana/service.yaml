apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-honeypot.fullname" . }}-grafana
  labels:
    {{- include "mcp-honeypot.componentFullLabels" (dict "component" "grafana" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.grafana.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "mcp-honeypot.componentLabels" (dict "component" "grafana" "root" .) | nindent 4 }}
