apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-honeypot.fullname" . }}-jaeger
  labels:
    {{- include "mcp-honeypot.componentFullLabels" (dict "component" "jaeger" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: ui
      port: {{ .Values.jaeger.uiPort }}
      targetPort: ui
      protocol: TCP
    - name: otlp-grpc
      port: {{ .Values.jaeger.otlpGrpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
  selector:
    {{- include "mcp-honeypot.componentLabels" (dict "component" "jaeger" "root" .) | nindent 4 }}
