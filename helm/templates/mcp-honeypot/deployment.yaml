apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-honeypot.fullname" . }}-honeypot
  labels:
    {{- include "mcp-honeypot.componentFullLabels" (dict "component" "honeypot" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.honeypot.replicas }}
  selector:
    matchLabels:
      {{- include "mcp-honeypot.componentLabels" (dict "component" "honeypot" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-honeypot.componentLabels" (dict "component" "honeypot" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: honeypot
          image: "{{ .Values.honeypot.image.repository }}:{{ .Values.honeypot.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.honeypot.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.honeypot.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.honeypot.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.honeypot.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.honeypot.readinessProbe | nindent 12 }}
