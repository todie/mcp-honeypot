apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-honeypot.fullname" . }}-honeypot
  labels:
    {{- include "mcp-honeypot.componentFullLabels" (dict "component" "honeypot" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.honeypot.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "mcp-honeypot.componentLabels" (dict "component" "honeypot" "root" .) | nindent 4 }}
