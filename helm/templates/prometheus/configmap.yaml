apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-honeypot.fullname" . }}-prometheus
  labels:
    {{- include "mcp-honeypot.componentFullLabels" (dict "component" "prometheus" "root" .) | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets:
              - {{ include "mcp-honeypot.fullname" . }}-otel-collector:{{ .Values.otelCollector.prometheusExportPort }}
