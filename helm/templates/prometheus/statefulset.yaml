apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mcp-honeypot.fullname" . }}-prometheus
  labels:
    {{- include "mcp-honeypot.componentFullLabels" (dict "component" "prometheus" "root" .) | nindent 4 }}
spec:
  serviceName: {{ include "mcp-honeypot.fullname" . }}-prometheus
  replicas: 1
  selector:
    matchLabels:
      {{- include "mcp-honeypot.componentLabels" (dict "component" "prometheus" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-honeypot.componentLabels" (dict "component" "prometheus" "root" .) | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsNonRoot: true
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time={{ .Values.prometheus.retentionTime }}
            - --storage.tsdb.retention.size={{ .Values.prometheus.retentionSize }}
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: {{ .Values.prometheus.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: data
              mountPath: /prometheus
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "mcp-honeypot.fullname" . }}-prometheus
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.prometheus.storageClassName }}
        storageClassName: {{ .Values.prometheus.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.prometheus.storage }}
