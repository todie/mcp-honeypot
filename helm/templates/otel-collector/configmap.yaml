apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-honeypot.fullname" . }}-otel-collector
  labels:
    {{- include "mcp-honeypot.componentFullLabels" (dict "component" "otel-collector" "root" .) | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.otelCollector.grpcPort }}
          http:
            endpoint: 0.0.0.0:{{ .Values.otelCollector.httpPort }}

    processors:
      memory_limiter:
        limit_mib: {{ .Values.otelCollector.memoryLimitMib }}
        check_interval: 5s
      batch:
        timeout: 5s
        send_batch_size: 512

    exporters:
      otlp/jaeger:
        endpoint: {{ include "mcp-honeypot.fullname" . }}-jaeger:{{ .Values.jaeger.otlpGrpcPort }}
        tls:
          insecure: true
      prometheus:
        endpoint: "0.0.0.0:{{ .Values.otelCollector.prometheusExportPort }}"
        namespace: mcp_honeypot

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/jaeger]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
