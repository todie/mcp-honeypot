apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-honeypot.fullname" . }}-otel-collector
  labels:
    {{- include "mcp-honeypot.componentFullLabels" (dict "component" "otel-collector" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: {{ .Values.otelCollector.grpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: {{ .Values.otelCollector.httpPort }}
      targetPort: otlp-http
      protocol: TCP
    - name: prom-export
      port: {{ .Values.otelCollector.prometheusExportPort }}
      targetPort: prom-export
      protocol: TCP
  selector:
    {{- include "mcp-honeypot.componentLabels" (dict "component" "otel-collector" "root" .) | nindent 4 }}
