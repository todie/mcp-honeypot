name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check server/ tests/

  typecheck:
    name: Type-check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-typecheck-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-typecheck-

      - name: Install dependencies + pyright
        run: |
          pip install -r server/requirements.txt
          pip install pyright

      - name: Run pyright
        run: pyright server/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run pytest
        env:
          PYTHONPATH: server
        run: pytest tests/ -v
