name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check server/ tests/ tools/ examples/

      - name: Ruff format check
        run: ruff format --check server/ tests/ tools/ examples/

  typecheck:
    name: Type-check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-typecheck-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-typecheck-

      - name: Install dependencies + pyright
        run: |
          pip install -r server/requirements.txt
          pip install pyright

      - name: Run pyright
        run: pyright server/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run pytest
        env:
          PYTHONPATH: server
        run: pytest tests/ -v

  secrets:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t mcp-honeypot:ci ./server

      - name: Verify healthcheck endpoint
        run: |
          docker run -d --name honeypot-ci -p 8000:8000 mcp-honeypot:ci
          sleep 3
          curl -sf http://localhost:8000/healthz | grep -q '"status"'
          docker stop honeypot-ci
