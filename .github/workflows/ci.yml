name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check server/ tests/ tools/ examples/

      - name: Ruff format check
        run: ruff format --check server/ tests/ tools/ examples/

  typecheck:
    name: Type-check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-typecheck-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-typecheck-

      - name: Install dependencies + pyright
        run: |
          pip install -r server/requirements.txt
          pip install pyright

      - name: Run pyright
        run: pyright server/

  # Fast unit tests — pure logic, no external deps (~135 tests)
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: server
        run: pytest tests/ -m unit --cov=server --cov-report=term-missing --no-cov-on-fail

  # Module tests — server modules with OTel/structlog (~50 tests)
  test-module:
    name: Module tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run module tests
        env:
          PYTHONPATH: server
        run: pytest tests/ -m module --cov=server --cov-report=term-missing --no-cov-on-fail

  # Tool/harness tests — adversarial agent, export, harness (~50 tests)
  test-tools:
    name: Tool tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run tool tests
        env:
          PYTHONPATH: server
        run: pytest tests/ -m tools --cov=server --cov-report=term-missing --no-cov-on-fail

  secrets:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build server image
        run: docker build -t mcp-honeypot:ci ./server

      - name: Verify healthcheck endpoint
        run: |
          docker run -d --name honeypot-ci -p 8000:8000 mcp-honeypot:ci
          sleep 3
          curl -sf http://localhost:8000/healthz | grep -q '"status"'
          docker stop honeypot-ci

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: mcp-honeypot:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true
