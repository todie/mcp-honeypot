[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "S101",  # assert statements OK in tests
    "S104",  # binding to 0.0.0.0 is intentional (honeypot)
    "S311",  # random is fine for fake data generation
    "E501",  # line length handled by formatter, not linter
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "B904", "SIM105", "C416", "E402"]  # test code, relaxed rules
"tools/*" = ["S", "B904", "SIM", "F841", "C416", "E402"]  # demo/tooling code, relaxed rules
"examples/*" = ["S", "B904", "SIM", "F841", "T201"]  # example code, relaxed rules
"server/tools/fake_responses.py" = ["S108"]  # fake paths like /tmp/ are intentional
"server/main.py" = ["SIM117"]  # nested with for SSE transport is clearer than single-line
"server/transport_wrapper.py" = ["S110"]  # try-except-pass for stream cleanup is intentional

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "basic"
include = ["server"]
extraPaths = ["server"]
reportMissingImports = true
reportMissingTypeStubs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: tests that require the live Docker Compose stack",
    "unit: fast pure-logic tests (no external deps)",
    "module: tests for server modules (may import OTel/structlog)",
    "tools: tests for CLI tools and test harness",
]
