[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "S101",  # assert statements OK in tests
    "S311",  # random is fine for fake data generation
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S"]  # silence security warnings in test files

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["server"]
reportMissingImports = true
reportMissingTypeStubs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
